<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro | Lectonautas</title>
  <link rel="icon" type="image/png" href="./recursos/logoLNautas1.png" />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
</head>

<body>
  <!-- Logo flotante en la esquina -->
  <a href="index.html" class="logo-esquina" title="Ir al Inicio">
    <img src="./recursos/logoLNautas1.png" alt="Logo Lectonautas" />
  </a>

  <div class="background-bubbles">
    <div class="bubble bubble1"></div>
    <div class="bubble bubble2"></div>
    <div class="bubble bubble3"></div>
    <div class="bubble bubble4"></div>
  </div>

  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="register-title">
      <h1 id="register-title">Crear usuario</h1>


      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="register-nombre">Nombre</label>
          <input type="text" id="register-nombre" name="nombre" placeholder="María" autocomplete="given-name"
            required />
        </div>

        <div class="form-group">
          <label for="register-apellido">Apellido</label>
          <input type="text" id="register-apellido" name="apellido" placeholder="González" autocomplete="family-name"
            required />
        </div>

        <div class="form-group">
          <label for="register-email">Correo</label>
          <input type="email" id="register-email" name="email" placeholder="docente@escuela.edu" autocomplete="email"
            required />
        </div>

        <div class="form-group">
          <label for="register-dni">DNI</label>
          <input type="text" id="register-dni" name="dni" placeholder="12345678" inputmode="numeric" autocomplete="off"
            required />
        </div>

        <div class="form-group">
          <label for="register-rol">Rol</label>
          <select id="register-rol" name="rol" required>
            <option value="Docente">Docente</option>
            <option value="Directivo">Directivo</option>
            <option value="Administrador">Administrador</option>
            <option value="Estudiante">Estudiante</option>
          </select>
        </div>

        <button type="submit" id="btn-registrar" class="btn-guardar">Crear usuario</button>
        <p id="register-mensaje" class="login-mensaje" role="status" aria-live="polite"></p>
        <div id="register-resultado" class="registro-resultado oculto" aria-live="polite"></div>
        <p class="auth-link-row">
          ¿Ya tenés usuario?
          <a class="auth-link" href="login.html">Volver al ingreso</a>
        </p>
      </form>
    </section>
  </main>

  <!-- Footer de marca -->
  <footer class="app-footer">
    <span class="footer-desarrollador">Desarrollado por</span>
    <img src="./recursos/logo2b.png" alt="Moon Solution" class="footer-logo" />
  </footer>

  <script src="app.js"></script>
</body>

</html>
